# Simple example with minimal fields for proper functionality

name: elevenlabs_tts_config
speech_to_text:
  provider: watson_stt
  watson_stt_config:
    api_url: "example-stt-url"
    api_key: "example-stt-key"
    model: "example model" # "en-US"
text_to_speech:
  provider: elevenlabs_tts
  elevenlabs_tts_config:
    api_key: "your-elevenlabs-api-key"
    model_id: "example model" # "eleven_turbo_v2_5"
    voice_id: "example voice id" # "CwhRBWXzGAHq8TQ4Fs17"
